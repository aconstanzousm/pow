{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Usm | Mi Cuenta</title>
    <link rel="stylesheet" href="{% static 'menu.css' %}">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7rem 5% 4rem;
        }

        .auth-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
        }

        .auth-card h2 {
            font-size: 1.6rem;
            color: var(--color-1);
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .auth-card h2 span { color: var(--color-3); }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0 1.5rem;
            background: rgba(255,255,255,0.4);
            border-radius: 14px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.7rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .auth-tab.active {
            background: var(--color-2);
            color: #fff;
        }

        .auth-form { display: none; flex-direction: column; gap: 1.1rem; }
        .auth-form.active { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-2);
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid var(--glass-border);
            border-radius: 14px;
            padding: 0.85rem 1.1rem;
            font-size: 0.92rem;
            color: var(--color-1);
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--color-3);
            background: #fff;
        }

        .form-row { display: flex; gap: 0.8rem; }
        .form-row .form-group { flex: 1; }

        .auth-error {
            font-size: 0.8rem;
            color: #e05c7a;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        .auth-error.visible { display: block; }

        .btn-auth {
            background: var(--color-2);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 0.95rem;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-auth:hover { background: var(--color-1); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link:hover { color: var(--color-1); }
    </style>
</head>

<body>
    <div class="background-overlay"></div>

    <nav class="glass-nav">
        <div class="logo">CAFÉ<span>USM</span></div>
        <ul class="nav-links">
            <li><a href="/menu.html">Menú</a></li>
        </ul>
    </nav>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2>Mi <span>Cuenta</span></h2>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</div>
                <div class="auth-tab" id="tabRegistro" onclick="switchTab('registro')">Registrarme</div>
            </div>

            <form class="auth-form active" id="formLogin">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="loginUsername" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" autocomplete="current-password" required>
                </div>
                <span class="auth-error" id="loginError"></span>
                <button type="submit" class="btn-auth" id="btnLogin">Iniciar Sesión</button>
            </form>

            <form class="auth-form" id="formRegistro">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="regNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" id="regApellido">
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" required>
                </div>
                <span class="auth-error" id="regError"></span>
                <button type="submit" class="btn-auth" id="btnRegistro">Crear Cuenta</button>
            </form>

            <a href="/menu.html" class="back-link">← Volver al menú</a>
        </div>
    </main>

    <script src="{% static 'cliente-auth.js' %}"></script>
    <script>
        const API_BASE = window.location.origin;

        if (CafeAuth.isClienteLoggedIn()) {
            window.location.href = '/mis-pedidos/';
        }

        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegistro').classList.toggle('active', tab === 'registro');
            document.getElementById('formLogin').classList.toggle('active', tab === 'login');
            document.getElementById('formRegistro').classList.toggle('active', tab === 'registro');
        }

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('loginError');
            errEl.classList.remove('visible');

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            try {
                const res = await fetch(`${API_BASE}/clientes/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'No se pudo iniciar sesión.');

                CafeAuth.setClienteSession(username, password, data.cliente);
                window.location.href = '/mis-pedidos/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        });

        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegistro');
            const errEl = document.getElementById('regError');
            errEl.classList.remove('visible');

            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const payload = {
                nombre: document.getElementById('regNombre').value.trim(),
                apellido: document.getElementById('regApellido').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                username,
                password
            };

            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';
            try {
                const res = await fetch(`${API_BASE}/clientes/registro/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) {
                    const msg = (data && (data.detail || data.username || data.email || data.error)) || 'No se pudo crear la cuenta.';
                    throw new Error(Array.isArray(msg) ? msg[0] : msg);
                }

                CafeAuth.setClienteSession(username, password, data.cliente);
                window.location.href = '/mis-pedidos/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Crear Cuenta';
            }
        });
    </script>
</body>

</html>
