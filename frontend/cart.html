<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de la Cafetería</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Tumami Cafetería</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menú</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="aboutus.html">Sobre nosotros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Carousel -->
    <div id="demo" class="carousel slide" data-bs-ride="">
        <!-- The slideshow/carousel -->
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://picsum.photos/id/684/600/400" alt="Menú de la Cafetería" class="d-block w-100"
                    style="height: 400px;">
                <div class="carousel-caption">
                    <h3>Carrito de Compras</h3>
                    <p>Revisa los productos que has agregado a tu carrito.</p>
                </div>
            </div>
        </div>
    </div>
    <!-- End of Carousel -->

    <div class="container mt-5 pt-5">
        <h1 class="text-center mb-4">Tu Carrito de Compras</h1>
        <div class="row">
            <div class="col-md-8">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Unitario</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Aquí se agregarán los productos del carrito dinámicamente -->
                    </tbody>
                </table>
                <div class="text-end">
                    <h4>Total: $<span id="cart-total">0.00</span></h4>
                    <button class="btn btn-primary">Proceder al Pago</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 Cafetería. Todos los derechos reservados.</p>
    </div>
    
    <script>
        // Simulación de productos en el carrito
        const cartItems = [
            { name: 'Capuccino', quantity: 2, price: 3.50 },
            { name: 'Té Verde', quantity: 1, price: 2.00 },
            { name: 'Ciabata Verde', quantity: 3, price: 4.00 }
        ];

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotalElement = document.getElementById('cart-total');
            cartItemsContainer.innerHTML = '';
            let total = 0;

            cartItems.forEach(item => {
                const itemTotal = item.quantity * item.price;
                total += itemTotal;
                const row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>$${itemTotal.toFixed(2)}</td>
                        <td><button class="btn btn-danger btn-sm">Eliminar</button></td>
                    </tr>
                `;
                cartItemsContainer.innerHTML += row;
            });

            cartTotalElement.textContent = total.toFixed(2);
        }

        // Renderizar el carrito al cargar la página
        renderCart();
    </script>
</body>
