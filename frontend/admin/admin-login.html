{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Usm | Acceso Interno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'admin/admin.css' %}">
</head>
<body class="login-body">
    <div class="login-bg">
        <div class="login-blob blob-1"></div>
        <div class="login-blob blob-2"></div>
        <div class="login-blob blob-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-logo">CAFÉ<span>USM</span></div>
                <p class="brand-sub">Panel de Gestión Interna</p>
            </div>

            <div class="login-form">
                <div class="form-field">
                    <label>Usuario</label>
                    <input type="text" id="loginUser" placeholder="tu.usuario" autocomplete="username">
                    <span class="field-error" id="userErr">Usuario requerido.</span>
                </div>
                <div class="form-field">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
                        <button class="toggle-pass" onclick="togglePass()" type="button" tabindex="-1">👁</button>
                    </div>
                    <span class="field-error" id="passErr">Contraseña requerida.</span>
                </div>

                <div class="login-error" id="loginError">Usuario o contraseña incorrectos.</div>

                <button class="btn-login" onclick="doLogin()">Ingresar →</button>

                <div class="login-hint">
                    <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; empleado / emp123
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        function setAuth(username, password, role) {
            localStorage.setItem('cafeAuth', btoa(`${username}:${password}`));
            localStorage.setItem('cafeRole', role);
            localStorage.setItem('cafeUser', username);
        }

        function clearAuth() {
            localStorage.removeItem('cafeAuth');
            localStorage.removeItem('cafeRole');
            localStorage.removeItem('cafeUser');
        }

        function togglePass() {
            const inp = document.getElementById('loginPass');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        async function doLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            const uErr = document.getElementById('userErr');
            const pErr = document.getElementById('passErr');
            const loginErr = document.getElementById('loginError');

            let ok = true;
            uErr.classList.remove('visible');
            pErr.classList.remove('visible');
            loginErr.classList.remove('visible');

            if (!u) { uErr.classList.add('visible'); ok = false; }
            if (!p) { pErr.classList.add('visible'); ok = false; }
            if (!ok) return;

            try {
                const res = await fetch(API_BASE + '/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    loginErr.classList.add('visible');
                    return;
                }

                setAuth(u, p, data.role);
                window.location.href = data.role === 'admin' ? '/admin/admin-panel.html' : '/admin/empleado-panel.html';
            } catch (e) {
                console.error('Login error:', e);
                loginErr.classList.add('visible');
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        const token = localStorage.getItem('cafeAuth');
        const role = localStorage.getItem('cafeRole');
        if (token && role) {
            window.location.href = role === 'admin' ? '/admin/admin-panel.html' : '/admin/empleado-panel.html';
        }
    </script>
</body>
</html>
